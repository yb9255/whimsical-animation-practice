<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script type="importmap">
      {
        "imports": {
          "lodash.random": "https://esm.sh/lodash.random@3.2.0",
          "lodash.range": "https://esm.sh/lodash.range@3.2.0"
        }
      }
    </script>
    <script type="module" defer src="index.js"></script>
    <link rel="stylesheet" href="reset.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <style>
      @keyframes fadeOut {
        to {
          opacity: 0;
        }
      }

      @keyframes disperse {
        from {
          top: 50%;
          left: 50%;
        }
      }

      .particle {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: white;
        animation:
          fadeOut var(--fade-duration) forwards,
          disperse 500ms;

        transform: translate(-50%, -50%);
      }
    </style>
    <button class="particleButton">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path
          d="M3.68546 5.43796C8.61936 1.29159 11.8685 7.4309 12.0406 7.4309C12.2126 7.43091 15.4617 1.29159 20.3956 5.43796C26.8941 10.8991 13.5 21.8215 12.0406 21.8215C10.5811 21.8215 -2.81297 10.8991 3.68546 5.43796Z"
          stroke="white"
          stroke-width="2"
          stroke-linecap="round"
        />
      </svg>
      <span class="visually-hidden">Like this post</span>
    </button>
  </body>
</html>
